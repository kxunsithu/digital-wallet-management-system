version: '3.9'
services:
  db:
    image: postgres:16
    container_name: digital-wallet-db
    environment:
      POSTGRES_DB: digital_wallet_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5432:5432'
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./src/main/resources/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro

  backend:
    build: .
    container_name: digital-wallet-backend
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/digital_wallet_db
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      SPRING_JPA_HIBERNATE_DDL_AUTO: none
      JWT_SECRET: change-this-secret-key-should-be-very-long
      INFINIREACH_API_KEY: your-infinireach-api-key
    ports:
      - '8080:8080'
    restart: unless-stopped

volumes:
  db_data:
