services:
  - type: web
    name: smart-wallet-backend-api
    env: docker
    # Docker services on Render should use CMD in Dockerfile, not startCommand here
    # buildCommand is also usually handled in the Dockerfile for Docker services
    healthCheckPath: /
    envVars:
      - key: APP_NAME
        value: Laravel
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        value: https://smart-wallet-backend-api.onrender.com
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        fromDatabase:
          name: smart-wallet-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: smart-wallet-db
          property: port
      - key: DB_DATABASE
        fromDatabase:
          name: smart-wallet-db
          property: database
      - key: DB_USERNAME
        fromDatabase:
          name: smart-wallet-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: smart-wallet-db
          property: password
      - key: INFINIREACH_API_KEY
        value: smsrelay_6b86908d75b8526fd4898bec03964bc58e479dd86b8b4923302e4187f3581569
      - key: INFINIREACH_SENDER_NUMBER
        value: "+959944074981"
      - key: INFINIREACH_BASE_URL
        value: https://api.infinireach.io/api/v1
      - key: AUTH_ADMIN_PHONE
        value: "+959944074981"
      - key: ADMIN_INITIAL_WALLET_BALANCE
        value: "1000000"
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database

databases:
  - name: smart-wallet-db
    plan: free
