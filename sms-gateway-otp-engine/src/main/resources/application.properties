# Spring Boot Application Configuration
spring.application.name=otp-authentication-engine

# Server Configuration
server.port=8080
server.servlet.context-path=/

# Database Configuration (PostgreSQL)
spring.datasource.url=jdbc:postgresql://localhost:5433/otp_auth_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# Logging Configuration
logging.level.root=INFO
logging.level.com.infinireach.otp=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n

# Infinireach SMS Gateway Configuration
infinireach.api.endpoint=https://api.infinireach.io/api/v1/messages
# Infinireach uses X-API-Key header for authentication per provider docs
infinireach.api.token=smsrelay_cf1c5b8e8e091292bb1fce45b5e2215cc32858cc95324510044cd4fec0d38dd1
infinireach.api.content-type=application/json

# OTP Configuration
otp.expiry.minutes=5
otp.length=6
otp.sms.test-mode=false
