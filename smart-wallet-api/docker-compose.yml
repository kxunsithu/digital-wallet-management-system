services:
  # Laravel PHP-FPM Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-wallet-app
    restart: unless-stopped
    working_dir: /var/www
    volumes:
      - .:/var/www
    networks:
      - smart-wallet-network
    depends_on:
      - postgres
      - redis

  # Nginx Web Server
  nginx:
    image: nginx:alpine
    container_name: smart-wallet-nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - smart-wallet-network
    depends_on:
      - app

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: smart-wallet-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-smart_wallet}
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - smart-wallet-network

  # Redis (Cache, Queue, Session)
  redis:
    image: redis:alpine
    container_name: smart-wallet-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - smart-wallet-network

  # Queue Worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-wallet-queue
    restart: unless-stopped
    working_dir: /var/www
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - .:/var/www
    networks:
      - smart-wallet-network
    depends_on:
      - app
      - redis

  # Task Scheduler
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: smart-wallet-scheduler
    restart: unless-stopped
    working_dir: /var/www
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    volumes:
      - .:/var/www
    networks:
      - smart-wallet-network
    depends_on:
      - app
      - redis

networks:
  smart-wallet-network:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
